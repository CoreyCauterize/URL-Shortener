<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Flask URL Shortener</title>
</head>
<body>
  <h1>URL Shortener</h1>
  <input id="url" placeholder="https://example.com">
  <input id="custom" placeholder="custom code (optional)">
  <button onclick="shorten()">Shorten</button>
  <p id="result"></p>

  <script>
    async function shorten() {
      const url = document.getElementById("url").value;
      const custom_code = document.getElementById("custom").value;

      const res = await fetch("/api/shorten", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({url, custom_code})
      });

      const data = await res.json();
      if (res.ok) {
        const shortUrl = data.short_url.startsWith("/")
          ? location.origin + data.short_url
          : data.short_url;
        document.getElementById("result").innerHTML =
          `<a href="${shortUrl}" target="_blank">${shortUrl}</a>`;
      } else {
        document.getElementById("result").innerText = data.error;
      }
    }
  </script>
</body>
</html>
